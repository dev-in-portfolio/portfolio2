<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RecalGrid</title>
    <style>
      :root { --bg:#101322; --card:#19223d; --txt:#eff4ff; --m:#a8b7dc; --a:#8de8ff; --b:#8fa4ff; --bd:#324a79; }
      * { box-sizing:border-box; }
      body { margin:0; font-family: Inter,system-ui,sans-serif; color:var(--txt); background:radial-gradient(circle at 20% 0,#244173 0,#101322 58%); }
      .wrap { max-width:1100px; margin:0 auto; padding:24px; }
      .card { border:1px solid var(--bd); border-radius:14px; background:var(--card); padding:14px; }
      .row { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:12px; }
      input,textarea,button { width:100%; border:1px solid #3f619e; border-radius:10px; background:#121b35; color:var(--txt); padding:10px; }
      button { background:linear-gradient(90deg,var(--a),var(--b)); color:#061225; font-weight:700; border:none; cursor:pointer; }
      .m { color:var(--m); font-size:.9rem; }
      .item { border:1px solid #2f4677; border-radius:10px; padding:10px; margin-top:8px; background:#121b35; }
      @media(max-width:960px){ .row{grid-template-columns:1fr;} }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <h1>RecalGrid</h1>
        <p class="m">Knowledge library with text search, tag filters, and JSON/CSV export.</p>
        <p id="status" class="m">Checking API...</p>
      </section>
      <section class="row">
        <article class="card">
          <h2>Add Chunk</h2>
          <input id="title" placeholder="Title" />
          <input id="source" placeholder="Source (optional)" />
          <input id="tags" placeholder="tags comma-separated" />
          <textarea id="body" rows="10" placeholder="Body"></textarea>
          <button id="save">Save Chunk</button>
        </article>
        <article class="card">
          <h2>Search</h2>
          <input id="query" placeholder="query" />
          <input id="searchTags" placeholder="required tags comma-separated" />
          <input id="limit" type="number" value="15" min="1" max="100" />
          <button id="search">Search</button>
          <button id="exportJson">Export JSON</button>
          <button id="exportCsv">Export CSV</button>
          <div id="results" class="m"></div>
        </article>
      </section>
    </main>
    <script>
      const key = localStorage.recalgridKey || (localStorage.recalgridKey = `recalgrid-${crypto.randomUUID()}`);
      const headers = {'Content-Type':'application/json','X-Device-Key':key};
      const statusEl = document.getElementById('status');
      const resultsEl = document.getElementById('results');

      function parseTags(v){ return String(v||'').split(',').map(s=>s.trim().toLowerCase()).filter(Boolean); }

      async function health(){
        const res = await fetch('/api/health/db');
        const data = await res.json();
        statusEl.textContent = data.ok ? 'API connected to database.' : `API warning: ${data.error || 'unavailable'}`;
      }

      function render(rows){
        if(!rows.length){ resultsEl.innerHTML='<div class="m">No results.</div>'; return; }
        resultsEl.innerHTML = rows.map(r=>`<div class="item"><strong>${r.title}</strong><div class='m'>${(r.tags||[]).join(', ')} | ${r.source||'—'}</div><p>${r.body.slice(0,220)}${r.body.length>220?'...':''}</p></div>`).join('');
      }

      document.getElementById('save').onclick = async () => {
        const payload = {
          title: document.getElementById('title').value.trim(),
          source: document.getElementById('source').value.trim(),
          tags: parseTags(document.getElementById('tags').value),
          body: document.getElementById('body').value
        };
        const res = await fetch('/api/recalgrid/chunks', { method:'POST', headers, body: JSON.stringify(payload) });
        const data = await res.json().catch(()=>({}));
        if(!res.ok){ alert(data.error || data.detail || 'save failed'); return; }
        document.getElementById('title').value='';
        document.getElementById('source').value='';
        document.getElementById('tags').value='';
        document.getElementById('body').value='';
        document.getElementById('search').click();
      };

      document.getElementById('search').onclick = async () => {
        const payload = {
          query: document.getElementById('query').value.trim(),
          tags: parseTags(document.getElementById('searchTags').value),
          limit: Number(document.getElementById('limit').value || 15)
        };
        const res = await fetch('/api/recalgrid/search', { method:'POST', headers, body: JSON.stringify(payload) });
        const data = await res.json().catch(()=>({}));
        if(!res.ok){ alert(data.error || data.detail || 'search failed'); return; }
        render(Array.isArray(data.results)?data.results:[]);
      };

      document.getElementById('exportJson').onclick = async () => {
        const res = await fetch('/api/recalgrid/export?format=json', { headers });
        const txt = await res.text();
        const blob = new Blob([txt], { type: 'application/json' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'recalgrid_export.json'; a.click();
      };
      document.getElementById('exportCsv').onclick = async () => {
        const res = await fetch('/api/recalgrid/export?format=csv', { headers });
        const txt = await res.text();
        const blob = new Blob([txt], { type: 'text/csv' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'recalgrid_export.csv'; a.click();
      };

      health().catch(()=>{ statusEl.textContent='API unavailable.'; });
      document.getElementById('search').click();
    </script>
  </body>
</html>
