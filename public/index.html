<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SchemaPulse</title>
    <style>
      :root { --bg:#101322; --card:#1b223a; --txt:#eef4ff; --m:#a8b7dd; --a:#8de9ff; --b:#8fa3ff; --bd:#334a79; }
      * { box-sizing:border-box; }
      body { margin:0; font-family: Inter,system-ui,sans-serif; color:var(--txt); background:radial-gradient(circle at 20% 0,#244074 0,#101322 58%); }
      .wrap { max-width:1120px; margin:0 auto; padding:24px; }
      .card { border:1px solid var(--bd); border-radius:14px; background:var(--card); padding:14px; }
      .row { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:12px; }
      input,select,textarea,button { width:100%; border:1px solid #41639d; border-radius:10px; background:#121b35; color:var(--txt); padding:10px; }
      button { background:linear-gradient(90deg,var(--a),var(--b)); color:#071225; font-weight:700; border:none; cursor:pointer; }
      .m { color:var(--m); font-size:.9rem; }
      table { width:100%; border-collapse: collapse; }
      th,td { border-bottom:1px solid #334a79; text-align:left; padding:6px; }
      @media(max-width:980px){ .row{grid-template-columns:1fr;} }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <h1>SchemaPulse</h1>
        <p class="m">Schema explorer + migration set manager with runbook/readiness output.</p>
        <p id="status" class="m">Checking API...</p>
      </section>
      <section class="row">
        <article class="card">
          <h2>Schema Explorer</h2>
          <button id="loadTables">Load Tables</button>
          <input id="tableFilter" placeholder="filter schema.table" />
          <select id="tableSelect"></select>
          <button id="loadDetails">Load Details</button>
          <button id="runbookBtn">Generate Runbook</button>
          <button id="readinessBtn">Readiness Checks</button>
          <div id="schemaOut" class="m"></div>
        </article>
        <article class="card">
          <h2>Migration Sets</h2>
          <input id="setName" placeholder="new migration set name" />
          <button id="createSet">Create Set</button>
          <select id="setSelect"></select>
          <input id="filename" placeholder="001_init.sql" />
          <textarea id="sqlText" rows="8" placeholder="migration SQL"></textarea>
          <button id="saveMigration">Save Migration</button>
          <button id="exportSet">Export Combined SQL</button>
          <div id="setOut" class="m"></div>
        </article>
      </section>
    </main>
    <script>
      const key = localStorage.schemapulseKey || (localStorage.schemapulseKey = `schemapulse-${crypto.randomUUID()}`);
      const headers = {'Content-Type':'application/json','X-Device-Key':key};
      const statusEl = document.getElementById('status');
      const tableSelect = document.getElementById('tableSelect');
      const setSelect = document.getElementById('setSelect');
      let tables = [];

      async function health(){
        const res = await fetch('/api/health/db');
        const data = await res.json();
        statusEl.textContent = data.ok ? 'API connected to database.' : `API warning: ${data.error || 'unavailable'}`;
      }

      function renderTableOptions(list){
        tableSelect.innerHTML = list.map(t=>`<option value="${t.schema}.${t.table}">${t.schema}.${t.table}</option>`).join('');
      }

      async function loadTables(){
        const res = await fetch('/api/schemapulse/tables', { headers });
        const data = await res.json().catch(()=>({}));
        tables = Array.isArray(data.tables)?data.tables:[];
        renderTableOptions(tables);
      }

      async function loadSets(){
        const res = await fetch('/api/schemapulse/migration-sets', { headers });
        const data = await res.json().catch(()=>({}));
        const rows = Array.isArray(data.sets)?data.sets:[];
        setSelect.innerHTML = rows.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
      }

      document.getElementById('tableFilter').oninput = () => {
        const q = document.getElementById('tableFilter').value.trim().toLowerCase();
        const filtered = q ? tables.filter(t=>`${t.schema}.${t.table}`.toLowerCase().includes(q)) : tables;
        renderTableOptions(filtered);
      };

      document.getElementById('loadTables').onclick = loadTables;

      document.getElementById('loadDetails').onclick = async () => {
        const v = tableSelect.value;
        if(!v) return;
        const [schema, table] = v.split('.');
        const [c, i, k] = await Promise.all([
          fetch(`/api/schemapulse/columns?schema=${encodeURIComponent(schema)}&table=${encodeURIComponent(table)}`, { headers }).then(r=>r.json()),
          fetch(`/api/schemapulse/indexes?schema=${encodeURIComponent(schema)}&table=${encodeURIComponent(table)}`, { headers }).then(r=>r.json()),
          fetch(`/api/schemapulse/constraints?schema=${encodeURIComponent(schema)}&table=${encodeURIComponent(table)}`, { headers }).then(r=>r.json())
        ]);
        const cols = Array.isArray(c.columns)?c.columns:[];
        const idx = Array.isArray(i.indexes)?i.indexes:[];
        const con = Array.isArray(k.constraints)?k.constraints:[];
        document.getElementById('schemaOut').innerHTML = `
          <h3>Columns (${cols.length})</h3><pre>${JSON.stringify(cols, null, 2)}</pre>
          <h3>Indexes (${idx.length})</h3><pre>${JSON.stringify(idx, null, 2)}</pre>
          <h3>Constraints (${con.length})</h3><pre>${JSON.stringify(con, null, 2)}</pre>`;
      };

      document.getElementById('runbookBtn').onclick = async () => {
        const txt = await fetch('/api/schemapulse/runbook', { headers }).then(r=>r.text());
        document.getElementById('schemaOut').innerHTML = `<pre>${txt}</pre>`;
      };

      document.getElementById('readinessBtn').onclick = async () => {
        const data = await fetch('/api/schemapulse/readiness', { headers }).then(r=>r.json());
        document.getElementById('schemaOut').innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
      };

      document.getElementById('createSet').onclick = async () => {
        const name = document.getElementById('setName').value.trim();
        const res = await fetch('/api/schemapulse/migration-sets', { method:'POST', headers, body:JSON.stringify({ name }) });
        const data = await res.json().catch(()=>({}));
        if(!res.ok){ alert(data.error || data.detail || 'create set failed'); return; }
        await loadSets();
      };

      document.getElementById('saveMigration').onclick = async () => {
        const setId = setSelect.value;
        if(!setId) return alert('select set');
        const payload = { filename: document.getElementById('filename').value.trim(), sql_text: document.getElementById('sqlText').value };
        const res = await fetch(`/api/schemapulse/migration-sets/${setId}/migrations`, { method:'POST', headers, body:JSON.stringify(payload) });
        const data = await res.json().catch(()=>({}));
        if(!res.ok){ alert(data.error || data.detail || 'save migration failed'); return; }
        document.getElementById('setOut').textContent = 'Migration saved.';
      };

      document.getElementById('exportSet').onclick = async () => {
        const setId = setSelect.value;
        if(!setId) return alert('select set');
        const txt = await fetch(`/api/schemapulse/migration-sets/${setId}/export`, { headers }).then(r=>r.text());
        document.getElementById('setOut').innerHTML = `<pre>${txt}</pre>`;
      };

      health().catch(()=>{ statusEl.textContent='API unavailable.'; });
      loadTables();
      loadSets();
    </script>
  </body>
</html>
