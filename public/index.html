<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TapForge</title>
    <style>
      :root { --bg:#0b1020; --card:#111a33; --txt:#ecf2ff; --muted:#9cb1d9; --a:#67d4ff; --b:#8aa2ff; --bd:#2a3b67; }
      * { box-sizing: border-box; }
      body { margin:0; font-family: Inter, system-ui, sans-serif; color:var(--txt); background:radial-gradient(circle at 20% 0,#1a2c5a 0,#0b1020 55%); }
      .wrap { max-width: 960px; margin: 0 auto; padding: 24px; }
      .hero { border:1px solid var(--bd); background:linear-gradient(120deg,#0f1933,#111a33); border-radius:16px; padding:18px; }
      h1 { margin:0 0 6px; font-size: 1.9rem; }
      p { color: var(--muted); }
      .row { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-top:14px; }
      .card { border:1px solid var(--bd); border-radius:14px; background:var(--card); padding:14px; }
      input, textarea, button { width:100%; border-radius:10px; border:1px solid #32508d; background:#0d1730; color:var(--txt); padding:10px; }
      button { background: linear-gradient(90deg,var(--a),var(--b)); color:#061022; border:none; font-weight:700; cursor:pointer; }
      ul { list-style:none; margin:0; padding:0; display:grid; gap:8px; }
      li { border:1px solid #284176; border-radius:10px; padding:10px; background:#0d1730; }
      .muted { color:var(--muted); font-size:.9rem; }
      @media (max-width: 880px) { .row { grid-template-columns:1fr; } }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="hero">
        <h1>TapForge</h1>
        <p>Create, store, duplicate, and edit interaction presets backed by Neon Postgres.</p>
        <p id="status" class="muted">Checking API...</p>
      </section>
      <section class="row">
        <article class="card">
          <h2>Create Preset</h2>
          <input id="name" placeholder="Preset name" />
          <textarea id="settings" rows="8">{"version":1,"controls":[{"id":"volume","type":"slider","min":0,"max":100,"step":1,"value":35}]}</textarea>
          <button id="create">Create</button>
        </article>
        <article class="card">
          <h2>Presets</h2>
          <ul id="list"></ul>
        </article>
      </section>
    </main>

    <script>
      const deviceKey = localStorage.tapforgeKey || (localStorage.tapforgeKey = `tapforge-${crypto.randomUUID()}`);
      const headers = { 'Content-Type': 'application/json', 'X-Device-Key': deviceKey };
      const statusEl = document.getElementById('status');
      const listEl = document.getElementById('list');

      async function health() {
        const res = await fetch('/api/health/db');
        const data = await res.json();
        statusEl.textContent = data.ok ? 'API connected to database.' : `API warning: ${data.error || 'unavailable'}`;
      }

      async function load() {
        const res = await fetch('/api/tapforge/presets', { headers });
        const items = await res.json();
        listEl.innerHTML = '';
        if (!Array.isArray(items) || !items.length) {
          listEl.innerHTML = '<li class="muted">No presets yet.</li>';
          return;
        }
        for (const item of items) {
          const li = document.createElement('li');
          li.innerHTML = `<strong>${item.name}</strong><div class="muted">${new Date(item.updated_at).toLocaleString()}</div>`;
          const row = document.createElement('div');
          row.style.display = 'grid';
          row.style.gridTemplateColumns = '1fr 1fr';
          row.style.gap = '8px';
          row.style.marginTop = '8px';
          const dup = document.createElement('button');
          dup.textContent = 'Duplicate';
          dup.onclick = async () => { await fetch(`/api/tapforge/presets/${item.id}/duplicate`, { method: 'POST', headers }); await load(); };
          const del = document.createElement('button');
          del.textContent = 'Delete';
          del.onclick = async () => { await fetch(`/api/tapforge/presets/${item.id}`, { method: 'DELETE', headers }); await load(); };
          row.append(dup, del);
          li.appendChild(row);
          listEl.appendChild(li);
        }
      }

      document.getElementById('create').onclick = async () => {
        const name = document.getElementById('name').value.trim();
        let settings;
        try { settings = JSON.parse(document.getElementById('settings').value); }
        catch { alert('Settings must be valid JSON.'); return; }
        const res = await fetch('/api/tapforge/presets', {
          method: 'POST',
          headers,
          body: JSON.stringify({ name, settings })
        });
        if (!res.ok) {
          const e = await res.json().catch(() => ({}));
          alert(e.error || 'Failed to create preset.');
          return;
        }
        document.getElementById('name').value = '';
        await load();
      };

      health().catch(() => { statusEl.textContent = 'API unavailable.'; });
      load().catch(() => { listEl.innerHTML = '<li class="muted">Failed to load presets.</li>'; });
    </script>
  </body>
</html>
