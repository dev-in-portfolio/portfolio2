<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PalmLedger</title>
    <style>
      :root { --bg:#0a1222; --panel:#172440; --panel2:#1f2f50; --text:#ebf2ff; --muted:#a1b6de; --line:rgba(150,176,226,.28); }
      *{box-sizing:border-box;} body{margin:0;font-family:"Space Grotesk",system-ui,sans-serif;color:var(--text);background:linear-gradient(180deg,#0a1222,#0f1c38);}
      .wrap{max-width:1120px;margin:0 auto;padding:28px 16px 58px;} .hero,.card{border:1px solid var(--line);border-radius:14px;background:var(--panel);padding:14px;}
      .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px;} .card{background:var(--panel2);}
      label{display:block;margin:8px 0 4px;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}
      input,textarea,select,button{width:100%;border-radius:10px;border:1px solid var(--line);background:#0d1931;color:var(--text);padding:8px 10px;font:inherit;}
      .row{display:flex;gap:8px;} .row>*{flex:1;}
      button{border:0;background:linear-gradient(90deg,#70dcff,#90abff);color:#03152b;font-weight:700;cursor:pointer;} button.secondary{border:1px solid var(--line);background:#172744;color:#dbe9ff;}
      .list{display:grid;gap:8px;margin-top:8px;max-height:430px;overflow:auto;} .item{border:1px solid var(--line);border-radius:10px;background:#0d1830;padding:10px;} .muted{color:var(--muted);}
      @media (max-width:900px){.grid{grid-template-columns:1fr;}.row{flex-direction:column;}}
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="hero"><h1 style="margin:0 0 8px">PalmLedger</h1><p class="muted" style="margin:0">Capture ledger entries with categories and recent rollups.</p></section>
      <section class="grid">
        <article class="card">
          <h3 style="margin:0">Entry</h3>
          <label>Title</label><input id="title" placeholder="Lunch expense" />
          <label>Amount</label><input id="amountNum" type="number" step="0.01" value="12.50" />
          <label>Unit</label><input id="amountUnit" value="USD" />
          <label>Category</label><select id="category"></select>
          <label>Note</label><input id="note" placeholder="Client meeting" />
          <div class="row" style="margin-top:8px"><button id="save">Save Entry</button><button id="reload" class="secondary">Reload</button></div>
          <h3 style="margin:12px 0 0">Create Category</h3>
          <div class="row"><input id="catName" placeholder="Meals" /><button id="addCat">Add</button></div>
          <p id="msg" class="muted"></p>
        </article>
        <article class="card"><h3 style="margin:0">Recent Entries</h3><div id="entries" class="list"></div></article>
      </section>
    </main>
    <script>
      const keyName='palmledger_device_key'; let deviceKey=localStorage.getItem(keyName); if(!deviceKey&&crypto.randomUUID){deviceKey=crypto.randomUUID();localStorage.setItem(keyName,deviceKey);}
      const msg=(t,b=false)=>{const el=document.getElementById('msg');el.textContent=t;el.style.color=b?'#ffb7b7':'#a1b6de';};
      async function api(path,opts={}){const res=await fetch(path,{...opts,headers:{'content-type':'application/json','X-Device-Key':deviceKey,...(opts.headers||{})}});const data=await res.json().catch(()=>({}));if(!res.ok)throw new Error(data.detail||data.error||`http_${res.status}`);return data;}
      async function load(){try{const cats=await api('/api/ledger/categories?limit=200');const sel=document.getElementById('category');sel.innerHTML='<option value=\"\">None</option>';for(const c of cats.categories||[]){const o=document.createElement('option');o.value=c.id;o.textContent=c.name;sel.appendChild(o);}const data=await api('/api/ledger/entries?limit=100');const root=document.getElementById('entries');root.innerHTML='';for(const e of data.entries||[]){const c=document.createElement('div');c.className='item';c.innerHTML=`<strong>${e.title||'Entry'}</strong><div class=\"muted\">${e.amount_num||''} ${e.amount_unit||''} • ${new Date(e.occurred_at).toLocaleString()}</div><div>${e.note||''}</div>`;root.appendChild(c);}}catch(e){msg(e.message,true);}}
      document.getElementById('save').onclick=async()=>{try{await api('/api/ledger/entries',{method:'POST',body:JSON.stringify({title:document.getElementById('title').value.trim(),amountNum:Number(document.getElementById('amountNum').value),amountUnit:document.getElementById('amountUnit').value.trim(),categoryId:document.getElementById('category').value||null,note:document.getElementById('note').value.trim()})});msg('Entry saved.');await load();}catch(e){msg(e.message,true);}};
      document.getElementById('addCat').onclick=async()=>{try{await api('/api/ledger/categories',{method:'POST',body:JSON.stringify({name:document.getElementById('catName').value.trim(),kind:'manual'})});msg('Category added.');await load();}catch(e){msg(e.message,true);}};
      document.getElementById('reload').onclick=load;
      load();
    </script>
  </body>
</html>
