<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Qwik Atlas</title>
    <style>
      :root { --bg:#0a1222; --panel:#172440; --panel2:#1f2f50; --text:#ebf2ff; --muted:#a1b6de; --line:rgba(150,176,226,.28); }
      * { box-sizing:border-box; }
      body { margin:0; font-family:"Space Grotesk",system-ui,sans-serif; color:var(--text); background:linear-gradient(180deg,#0a1222,#0f1c38); }
      .wrap { max-width:1060px; margin:0 auto; padding:28px 16px 58px; }
      .hero,.card { border:1px solid var(--line); border-radius:14px; background:var(--panel); padding:14px; }
      .grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:12px; }
      .card { background:var(--panel2); }
      label { display:block; margin:8px 0 4px; font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; }
      input,textarea,button { width:100%; border-radius:10px; border:1px solid var(--line); background:#0d1931; color:var(--text); padding:8px 10px; font:inherit; }
      textarea { min-height:130px; resize:vertical; font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; }
      .row { display:flex; gap:8px; } .row > * { flex:1; }
      button { border:0; background:linear-gradient(90deg,#70dcff,#90abff); color:#03152b; font-weight:700; cursor:pointer; }
      button.secondary { border:1px solid var(--line); background:#172744; color:#dbe9ff; }
      .list { display:grid; gap:8px; margin-top:8px; max-height:460px; overflow:auto; }
      .item { border:1px solid var(--line); border-radius:10px; background:#0d1830; padding:10px; }
      .muted { color:var(--muted); } #msg { min-height:20px; }
      @media (max-width:900px) { .grid { grid-template-columns:1fr; } .row { flex-direction:column; } }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="hero">
        <h1 style="margin:0 0 8px">Qwik Atlas</h1>
        <p class="muted" style="margin:0">Saved route states and filter presets for collection browsing.</p>
      </section>
      <section class="grid">
        <article class="card">
          <h3 style="margin:0">Create View</h3>
          <label>Name</label>
          <input id="name" placeholder="Ops Dashboard" />
          <label>Route</label>
          <input id="route" value="/" />
          <label>State JSON</label>
          <textarea id="state">{"sort":"updated_at","filters":{"status":"active"}}</textarea>
          <div class="row" style="margin-top:8px">
            <button id="save">Save View</button>
            <button id="reload" class="secondary">Reload</button>
          </div>
          <p id="msg" class="muted"></p>
        </article>
        <article class="card">
          <h3 style="margin:0">Saved Views</h3>
          <div id="list" class="list"></div>
        </article>
      </section>
    </main>
    <script>
      const keyName = 'qwik_atlas_device_key';
      let deviceKey = localStorage.getItem(keyName);
      if (!deviceKey && crypto.randomUUID) { deviceKey = crypto.randomUUID(); localStorage.setItem(keyName, deviceKey); }
      const msg = (t, bad = false) => { const el = document.getElementById('msg'); el.textContent = t; el.style.color = bad ? '#ffb7b7' : '#a1b6de'; };
      async function api(path, opts = {}) {
        const res = await fetch(path, { ...opts, headers: { 'content-type': 'application/json', 'X-Device-Key': deviceKey, ...(opts.headers || {}) } });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.detail || data.error || `http_${res.status}`);
        return data;
      }
      async function load() {
        try {
          const data = await api('/api/qwik-atlas/views?route=' + encodeURIComponent(document.getElementById('route').value || '/'));
          const root = document.getElementById('list');
          root.innerHTML = '';
          for (const view of data.views || []) {
            const card = document.createElement('div');
            card.className = 'item';
            card.innerHTML = `<strong>${view.name}</strong><div class="muted">${view.route}</div><pre class="muted">${JSON.stringify(view.state, null, 2)}</pre>`;
            const del = document.createElement('button');
            del.className = 'secondary';
            del.textContent = 'Delete';
            del.onclick = async () => { await api(`/api/qwik-atlas/views/${view.id}`, { method: 'DELETE' }); await load(); };
            card.appendChild(del);
            root.appendChild(card);
          }
        } catch (e) { msg(e.message, true); }
      }
      document.getElementById('save').onclick = async () => {
        try {
          await api('/api/qwik-atlas/views', {
            method: 'POST',
            body: JSON.stringify({
              name: document.getElementById('name').value.trim(),
              route: document.getElementById('route').value.trim() || '/',
              state: JSON.parse(document.getElementById('state').value || '{}')
            })
          });
          msg('View saved.');
          await load();
        } catch (e) { msg(e.message, true); }
      };
      document.getElementById('reload').onclick = load;
      load();
    </script>
  </body>
</html>
