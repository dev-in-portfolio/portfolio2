<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Remix QueueSplice</title>
    <style>
      :root { --bg:#0a1222; --panel:#172440; --panel2:#1f2f50; --text:#ebf2ff; --muted:#a1b6de; --line:rgba(150,176,226,.28); }
      * { box-sizing:border-box; }
      body { margin:0; font-family:"Space Grotesk",system-ui,sans-serif; color:var(--text); background:linear-gradient(180deg,#0a1222,#0f1c38); }
      .wrap { max-width:1100px; margin:0 auto; padding:28px 16px 58px; }
      .hero,.card { border:1px solid var(--line); border-radius:14px; background:var(--panel); padding:14px; }
      .grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:12px; }
      .card { background:var(--panel2); }
      label { display:block; margin:8px 0 4px; font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; }
      input,textarea,select,button { width:100%; border-radius:10px; border:1px solid var(--line); background:#0d1931; color:var(--text); padding:8px 10px; font:inherit; }
      textarea { min-height:120px; resize:vertical; font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; }
      .row { display:flex; gap:8px; }
      .row > * { flex:1; }
      button { border:0; background:linear-gradient(90deg,#70dcff,#90abff); color:#03152b; font-weight:700; cursor:pointer; }
      button.secondary { border:1px solid var(--line); background:#172744; color:#dbe9ff; }
      .list { display:grid; gap:8px; margin-top:8px; max-height:430px; overflow:auto; }
      .item { border:1px solid var(--line); border-radius:10px; background:#0d1830; padding:10px; }
      .muted { color:var(--muted); }
      #msg { min-height:20px; }
      @media (max-width: 900px) { .grid { grid-template-columns:1fr; } .row { flex-direction:column; } }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="hero">
        <h1 style="margin:0 0 8px">Remix QueueSplice</h1>
        <p class="muted" style="margin:0">Enqueue, lease, complete, and dead-letter jobs with retry handling.</p>
      </section>
      <section class="grid">
        <article class="card">
          <h3 style="margin:0">Enqueue</h3>
          <label>Kind</label>
          <input id="kind" value="sync.catalog" />
          <label>Priority</label>
          <input id="priority" type="number" value="0" />
          <label>Payload JSON</label>
          <textarea id="payload">{"source":"netlify","batch":1}</textarea>
          <div class="row" style="margin-top:8px">
            <button id="enqueue">Enqueue</button>
            <button id="reload" class="secondary">Reload</button>
          </div>
          <p id="msg" class="muted"></p>
          <h3 style="margin:10px 0 0">Stats</h3>
          <div id="stats" class="list"></div>
        </article>
        <article class="card">
          <h3 style="margin:0">Worker</h3>
          <div class="row" style="margin-top:8px">
            <button id="lease">Lease Next Job</button>
            <button id="showDead" class="secondary">Show Dead</button>
          </div>
          <div id="leased" class="list"></div>
          <h3 style="margin:10px 0 0">Recent Jobs</h3>
          <div id="jobs" class="list"></div>
        </article>
      </section>
    </main>
    <script>
      const msg = (t, bad = false) => {
        const el = document.getElementById('msg');
        el.textContent = t;
        el.style.color = bad ? '#ffb7b7' : '#a1b6de';
      };
      async function api(path, opts = {}) {
        const res = await fetch(path, {
          ...opts,
          headers: { 'content-type': 'application/json', ...(opts.headers || {}) }
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.detail || data.error || `http_${res.status}`);
        return data;
      }
      async function loadStats() {
        const data = await api('/api/jobs/stats');
        const root = document.getElementById('stats');
        root.innerHTML = '';
        for (const s of data.items || []) {
          const card = document.createElement('div');
          card.className = 'item';
          card.textContent = `${s.status}: ${s.count}`;
          root.appendChild(card);
        }
      }
      async function loadJobs(status = '') {
        const q = status ? `?status=${encodeURIComponent(status)}` : '';
        const data = await api(`/api/jobs${q}`);
        const root = document.getElementById('jobs');
        root.innerHTML = '';
        for (const j of data.items || []) {
          const card = document.createElement('div');
          card.className = 'item';
          card.innerHTML = `<strong>${j.kind}</strong><div class="muted">${j.status} • attempts ${j.attempts}/${j.max_attempts}</div>`;
          root.appendChild(card);
        }
      }
      document.getElementById('enqueue').onclick = async () => {
        try {
          await api('/api/jobs', {
            method: 'POST',
            body: JSON.stringify({
              kind: document.getElementById('kind').value.trim(),
              priority: Number(document.getElementById('priority').value),
              payload: JSON.parse(document.getElementById('payload').value || '{}')
            })
          });
          msg('Job enqueued.');
          await loadStats();
          await loadJobs();
        } catch (e) { msg(e.message, true); }
      };
      document.getElementById('lease').onclick = async () => {
        try {
          const out = await api('/api/jobs/lease', {
            method: 'POST',
            body: JSON.stringify({ worker: 'netlify-ui', ttlSeconds: 90 })
          });
          const root = document.getElementById('leased');
          root.innerHTML = '';
          if (!out.leased) {
            msg('No ready jobs.');
            return;
          }
          const card = document.createElement('div');
          card.className = 'item';
          card.innerHTML = `<strong>${out.leased.kind}</strong><div class="muted">lease owner ${out.leased.lease_owner}</div>`;
          const row = document.createElement('div');
          row.className = 'row';
          row.style.marginTop = '8px';
          const ok = document.createElement('button');
          ok.textContent = 'Complete';
          ok.onclick = async () => {
            await api(`/api/jobs/${out.leased.id}/complete`, { method: 'POST', body: '{}' });
            await loadStats();
            await loadJobs();
            root.innerHTML = '';
          };
          const fail = document.createElement('button');
          fail.className = 'secondary';
          fail.textContent = 'Fail';
          fail.onclick = async () => {
            await api(`/api/jobs/${out.leased.id}/fail`, { method: 'POST', body: JSON.stringify({ error: 'manual fail from UI' }) });
            await loadStats();
            await loadJobs();
            root.innerHTML = '';
          };
          row.appendChild(ok);
          row.appendChild(fail);
          card.appendChild(row);
          root.appendChild(card);
          msg('Job leased.');
          await loadStats();
          await loadJobs();
        } catch (e) { msg(e.message, true); }
      };
      document.getElementById('reload').onclick = async () => { await loadStats(); await loadJobs(); };
      document.getElementById('showDead').onclick = async () => { await loadJobs('dead'); };
      loadStats().then(() => loadJobs()).catch((e) => msg(e.message, true));
    </script>
  </body>
</html>
