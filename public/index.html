<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Intake</title>
    <style>
      :root{--bg:#0a1020;--card:#131c36;--bd:#2f4a7f;--txt:#edf3ff;--muted:#a7b7dd;--a:#6cf0ff;--b:#7fa2ff}*{box-sizing:border-box}
      body{margin:0;background:radial-gradient(circle at 12% 0,#274b71 0,#0a1020 58%);color:var(--txt);font-family:Inter,system-ui,sans-serif}
      .wrap{max-width:1080px;margin:0 auto;padding:24px}.card{border:1px solid var(--bd);background:var(--card);border-radius:14px;padding:14px}
      .row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}input,textarea,button{width:100%;padding:10px;border-radius:10px;border:1px solid #3f609d;background:#11193a;color:var(--txt)}
      button{background:linear-gradient(90deg,var(--a),var(--b));border:none;color:#06162f;font-weight:700;cursor:pointer}.muted{color:var(--muted);font-size:.9rem}
      @media(max-width:960px){.row{grid-template-columns:1fr}}
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card"><h1>Intake</h1><p class="muted">Event intake pipeline with quarantine + retry flow.</p><p id="status" class="muted">Checking API...</p></section>
      <section class="row">
        <article class="card">
          <h2>Submit Event</h2>
          <input id="type" placeholder="eventType" value="order.created" />
          <input id="source" placeholder="source" value="ui" />
          <textarea id="payload" rows="8" placeholder='JSON payload'></textarea>
          <button id="send">Send to Intake</button>
          <div id="submitOut" class="muted"></div>
        </article>
        <article class="card">
          <h2>Queues</h2>
          <button id="loadRecords">Load Records</button>
          <button id="loadQ">Load Quarantine</button>
          <input id="retryId" placeholder="quarantine id to retry" />
          <button id="retry">Retry Quarantine Item</button>
          <div id="queueOut" class="muted"></div>
        </article>
      </section>
    </main>
    <script>
      const device = localStorage.intakeKey || (localStorage.intakeKey = `intake-${crypto.randomUUID()}`);
      const headers = {'Content-Type':'application/json','X-Device-Key':device};
      const status = document.getElementById('status');
      const submitOut = document.getElementById('submitOut');
      const queueOut = document.getElementById('queueOut');
      const esc=(s)=>String(s).replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
      const show=(el,data)=>{ el.innerHTML=`<pre>${esc(JSON.stringify(data,null,2))}</pre>`; };
      const val=(id)=>document.getElementById(id).value.trim();
      const parse=(raw)=>{ if(!raw) return {}; try{return JSON.parse(raw);}catch{return {invalid:true,raw};} };

      async function health(){ const r=await fetch('/api/health/db'); const d=await r.json(); status.textContent=d.ok?'API connected to database.':`API warning: ${d.error||'unavailable'}`; }

      document.getElementById('send').onclick=async()=>{
        const body={eventType:val('type'),source:val('source'),payload:parse(document.getElementById('payload').value)};
        const r=await fetch('/api/intake',{method:'POST',headers,body:JSON.stringify(body)});
        show(submitOut, await r.json().catch(()=>({error:'bad_response'})));
      };
      document.getElementById('loadRecords').onclick=async()=>{
        const r=await fetch('/api/intake/records',{headers});
        show(queueOut, await r.json().catch(()=>({error:'bad_response'})));
      };
      document.getElementById('loadQ').onclick=async()=>{
        const r=await fetch('/api/intake/quarantine',{headers});
        show(queueOut, await r.json().catch(()=>({error:'bad_response'})));
      };
      document.getElementById('retry').onclick=async()=>{
        const id=val('retryId');
        const r=await fetch(`/api/admin/quarantine/${encodeURIComponent(id)}/retry`,{method:'POST',headers,body:'{}'});
        show(queueOut, await r.json().catch(()=>({error:'bad_response'})));
      };

      health().catch(()=>status.textContent='API unavailable.');
    </script>
  </body>
</html>
