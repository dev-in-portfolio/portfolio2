<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rule Furnace</title>
    <style>
      :root { --bg:#0f0d14; --card:#191624; --txt:#f2ecff; --m:#b3a8cc; --a:#ff9f7f; --b:#ff6ea8; --bd:#4b386c; }
      * { box-sizing:border-box; }
      body { margin:0; font-family: Inter, system-ui, sans-serif; color:var(--txt); background:radial-gradient(circle at 16% 0,#3a234f 0,#0f0d14 58%); }
      .wrap { max-width:1040px; margin:0 auto; padding:24px; }
      .card { border:1px solid var(--bd); border-radius:14px; background:var(--card); padding:14px; }
      .row { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:12px; }
      input,textarea,button { width:100%; border-radius:10px; border:1px solid #674f91; background:#140f21; color:var(--txt); padding:10px; }
      button { background:linear-gradient(90deg,var(--a),var(--b)); color:#260f20; font-weight:700; border:none; cursor:pointer; }
      .list { display:grid; gap:8px; }
      .item { border:1px solid #5b4582; border-radius:10px; padding:10px; background:#150f23; }
      .m { color:var(--m); font-size:.9rem; }
      @media(max-width:900px){ .row{grid-template-columns:1fr;} }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <h1>Rule Furnace</h1>
        <p class="m">Write rules, test JSON input, and store run history in Neon.</p>
        <p id="status" class="m">Checking API...</p>
      </section>
      <section class="row">
        <article class="card">
          <h2>New Rule</h2>
          <input id="name" placeholder="Rule name" />
          <input id="priority" type="number" value="100" />
          <input id="expr" placeholder='when expression, e.g. risk.score >= 80 and account.tier == "gold"' />
          <textarea id="thenJson" rows="6">{"route":"manual-review","priority":"high"}</textarea>
          <button id="createRule">Create Rule</button>
        </article>
        <article class="card">
          <h2>Test Input</h2>
          <textarea id="testInput" rows="8">{"risk":{"score":88},"account":{"tier":"gold"}}</textarea>
          <button id="runTest">Run Test</button>
          <pre id="testOut" class="m"></pre>
        </article>
      </section>
      <section class="row">
        <article class="card">
          <h2>Rules</h2>
          <div id="rules" class="list"></div>
        </article>
        <article class="card">
          <h2>Recent Runs</h2>
          <div id="runs" class="list"></div>
        </article>
      </section>
    </main>
    <script>
      const key = localStorage.ruleFurnaceKey || (localStorage.ruleFurnaceKey = `rule-furnace-${crypto.randomUUID()}`);
      const headers = { 'Content-Type': 'application/json', 'X-Device-Key': key };
      const statusEl = document.getElementById('status');
      const rulesEl = document.getElementById('rules');
      const runsEl = document.getElementById('runs');

      async function health() {
        const res = await fetch('/api/health/db');
        const data = await res.json();
        statusEl.textContent = data.ok ? 'API connected to database.' : `API warning: ${data.error || 'unavailable'}`;
      }

      async function loadRules() {
        const res = await fetch('/api/rules', { headers });
        const data = await res.json();
        const rules = Array.isArray(data.rules) ? data.rules : [];
        rulesEl.innerHTML = '';
        if (!rules.length) { rulesEl.innerHTML = '<div class="m">No rules yet.</div>'; return; }
        rules.forEach((r) => {
          const item = document.createElement('div');
          item.className = 'item';
          item.innerHTML = `<strong>${r.name}</strong><div class='m'>priority ${r.priority}</div><div class='m'>${r.when_expr}</div><pre class='m'>${JSON.stringify(r.then_json, null, 2)}</pre>`;
          const del = document.createElement('button');
          del.textContent = 'Delete';
          del.onclick = async () => { await fetch(`/api/rules/${r.id}`, { method:'DELETE', headers }); await loadRules(); };
          item.appendChild(del);
          rulesEl.appendChild(item);
        });
      }

      async function loadRuns() {
        const res = await fetch('/api/runs', { headers });
        const data = await res.json();
        const runs = Array.isArray(data.runs) ? data.runs : [];
        runsEl.innerHTML = '';
        if (!runs.length) { runsEl.innerHTML = '<div class="m">No runs yet.</div>'; return; }
        runs.forEach((run) => {
          const item = document.createElement('div');
          item.className = 'item';
          item.innerHTML = `<div class='m'>${new Date(run.created_at).toLocaleString()}</div><div class='m'>matched: ${(run.matched_rule_ids || []).length}</div><pre class='m'>${JSON.stringify(run.output_json, null, 2)}</pre>`;
          runsEl.appendChild(item);
        });
      }

      document.getElementById('createRule').onclick = async () => {
        let thenJson;
        try { thenJson = JSON.parse(document.getElementById('thenJson').value); }
        catch { alert('then_json must be valid JSON'); return; }
        const payload = {
          name: document.getElementById('name').value.trim(),
          priority: Number(document.getElementById('priority').value || 0),
          when_expr: document.getElementById('expr').value.trim(),
          then_json: thenJson,
          is_enabled: true
        };
        const res = await fetch('/api/rules', { method:'POST', headers, body: JSON.stringify(payload) });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          alert(err.error || 'Failed to create rule');
          return;
        }
        document.getElementById('name').value='';
        document.getElementById('expr').value='';
        await loadRules();
      };

      document.getElementById('runTest').onclick = async () => {
        let input;
        try { input = JSON.parse(document.getElementById('testInput').value); }
        catch { alert('Input must be valid JSON'); return; }
        const res = await fetch('/api/test', { method:'POST', headers, body: JSON.stringify({ input }) });
        const out = await res.json();
        document.getElementById('testOut').textContent = JSON.stringify(out, null, 2);
        await loadRuns();
      };

      health().catch(() => { statusEl.textContent = 'API unavailable.'; });
      loadRules().catch(() => { rulesEl.innerHTML = '<div class="m">Failed to load rules.</div>'; });
      loadRuns().catch(() => { runsEl.innerHTML = '<div class="m">Failed to load runs.</div>'; });
    </script>
  </body>
</html>
