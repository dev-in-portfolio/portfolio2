<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PatchSmith</title>
    <style>
      :root { --bg:#0f1323; --card:#18203a; --txt:#f0f4ff; --m:#a9b8de; --a:#89e4ff; --b:#8ea4ff; --bd:#33497a; }
      * { box-sizing:border-box; }
      body { margin:0; font-family: Inter,system-ui,sans-serif; color:var(--txt); background:radial-gradient(circle at 20% 0,#243a70 0,#0f1323 58%); }
      .wrap { max-width:1100px; margin:0 auto; padding:24px; }
      .card { border:1px solid var(--bd); border-radius:14px; background:var(--card); padding:14px; }
      .row { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:12px; }
      input,textarea,select,button { width:100%; border:1px solid #42639e; border-radius:10px; background:#121a33; color:var(--txt); padding:10px; }
      button { background:linear-gradient(90deg,var(--a),var(--b)); color:#061225; font-weight:700; border:none; cursor:pointer; }
      .m { color:var(--m); font-size:.9rem; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; white-space: pre-wrap; }
      @media(max-width:960px){ .row{grid-template-columns:1fr;} }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <h1>PatchSmith</h1>
        <p class="m">Create file patches, approve, and apply with controlled occurrence targeting.</p>
        <p id="status" class="m">Checking API...</p>
      </section>
      <section class="row">
        <article class="card">
          <h2>Project + File</h2>
          <input id="projectName" placeholder="Project name" />
          <button id="createProject">Create / Select Project</button>
          <select id="projects"></select>
          <input id="filePath" placeholder="src/file.ts" />
          <textarea id="fileContent" rows="10" placeholder="File content"></textarea>
          <button id="saveFile">Save File</button>
        </article>
        <article class="card">
          <h2>Patch</h2>
          <input id="findText" placeholder="FIND text" />
          <textarea id="replaceText" rows="4" placeholder="REPLACE text"></textarea>
          <button id="createPatch">Create Patch</button>
          <select id="patches"></select>
          <input id="occurrence" type="number" value="1" min="1" />
          <button id="approvePatch">Approve Patch</button>
          <button id="applyPatch">Apply Patch</button>
          <div id="output" class="m mono"></div>
        </article>
      </section>
    </main>
    <script>
      const key = localStorage.patchsmithKey || (localStorage.patchsmithKey = `patchsmith-${crypto.randomUUID()}`);
      const headers = {'Content-Type':'application/json','X-Device-Key':key};
      const statusEl = document.getElementById('status');
      const projectsEl = document.getElementById('projects');
      const patchesEl = document.getElementById('patches');

      async function health(){
        const res = await fetch('/api/health/db');
        const data = await res.json();
        statusEl.textContent = data.ok ? 'API connected to database.' : `API warning: ${data.error || 'unavailable'}`;
      }

      async function loadProjects(){
        const res = await fetch('/api/patchsmith/projects', { headers });
        const data = await res.json().catch(()=>({}));
        const rows = Array.isArray(data.projects)?data.projects:[];
        projectsEl.innerHTML = rows.map(p=>`<option value="${p.id}">${p.name}</option>`).join('');
        if (rows[0]) await loadPatches(rows[0].id);
      }

      async function loadPatches(projectId){
        const res = await fetch(`/api/patchsmith/projects/${projectId}/patches`, { headers });
        const data = await res.json().catch(()=>({}));
        const rows = Array.isArray(data.patches)?data.patches:[];
        patchesEl.innerHTML = rows.map(p=>`<option value="${p.id}">${p.file_path} [${p.status}]</option>`).join('');
      }

      document.getElementById('createProject').onclick = async () => {
        const name = document.getElementById('projectName').value.trim();
        const res = await fetch('/api/patchsmith/projects', { method:'POST', headers, body:JSON.stringify({ name }) });
        const data = await res.json().catch(()=>({}));
        if (!res.ok) return alert(data.error || data.detail || 'create project failed');
        await loadProjects();
      };

      document.getElementById('saveFile').onclick = async () => {
        const projectId = projectsEl.value;
        if (!projectId) return alert('select project');
        const payload = { path: document.getElementById('filePath').value.trim(), content: document.getElementById('fileContent').value };
        const res = await fetch(`/api/patchsmith/projects/${projectId}/files`, { method:'POST', headers, body:JSON.stringify(payload) });
        const data = await res.json().catch(()=>({}));
        if (!res.ok) return alert(data.error || data.detail || 'save file failed');
        document.getElementById('output').textContent = 'File saved.';
      };

      document.getElementById('createPatch').onclick = async () => {
        const projectId = projectsEl.value;
        if (!projectId) return alert('select project');
        const payload = {
          file_path: document.getElementById('filePath').value.trim(),
          find_text: document.getElementById('findText').value,
          replace_text: document.getElementById('replaceText').value
        };
        const res = await fetch(`/api/patchsmith/projects/${projectId}/patches`, { method:'POST', headers, body:JSON.stringify(payload) });
        const data = await res.json().catch(()=>({}));
        if (!res.ok) return alert(data.error || data.detail || 'create patch failed');
        document.getElementById('output').textContent = `Patch created. match_count=${data.patch.match_count}`;
        await loadPatches(projectId);
      };

      document.getElementById('approvePatch').onclick = async () => {
        const patchId = patchesEl.value;
        if (!patchId) return alert('select patch');
        const res = await fetch(`/api/patchsmith/patches/${patchId}/approve`, { method:'POST', headers });
        const data = await res.json().catch(()=>({}));
        if (!res.ok) return alert(data.error || data.detail || 'approve failed');
        document.getElementById('output').textContent = 'Patch approved.';
        await loadPatches(projectsEl.value);
      };

      document.getElementById('applyPatch').onclick = async () => {
        const patchId = patchesEl.value;
        if (!patchId) return alert('select patch');
        const occurrence = Number(document.getElementById('occurrence').value || 1);
        const res = await fetch(`/api/patchsmith/patches/${patchId}/apply`, { method:'POST', headers, body:JSON.stringify({ occurrence }) });
        const data = await res.json().catch(()=>({}));
        if (!res.ok) return alert(data.error || data.detail || 'apply failed');
        document.getElementById('fileContent').value = data.updated_content || '';
        document.getElementById('output').textContent = 'Patch applied.';
        await loadPatches(projectsEl.value);
      };

      projectsEl.onchange = () => loadPatches(projectsEl.value);

      health().catch(()=>{ statusEl.textContent='API unavailable.'; });
      loadProjects();
    </script>
  </body>
</html>
