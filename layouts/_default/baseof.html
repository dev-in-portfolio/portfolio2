<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ block "title" . }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
    <link rel="stylesheet" href="{{ "css/styles.css" | relURL }}" />
  </head>
  <body>
    <header class="site-header">
      <div>
        <h1><a href="{{ "/" | relLangURL }}">ReleaseGallery</a></h1>
        <p>{{ .Site.Params.description }}</p>
      </div>
      <nav class="site-nav">
        <a href="{{ "/releases/" | relLangURL }}">Releases</a>
        <a href="{{ "/projects/" | relLangURL }}">Projects</a>
      </nav>
    </header>

    <main>
      {{ block "main" . }}{{ end }}
    </main>

    <footer>
      <small>ReleaseGallery • {{ now.Format "2006" }}</small>
    </footer>
  </body>
</html>
