name: Dockyard Release

on:
  push:
    tags:
      - "electron-dockyard-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: linux
            os: ubuntu-latest
            target: linux
            package_dir: Dockyard-linux-x64
            artifact_name: Dockyard-Linux-x64
          - name: windows
            os: windows-latest
            target: win32
            package_dir: Dockyard-win32-x64
            artifact_name: Dockyard-Windows-x64
          - name: macos
            os: macos-latest
            target: darwin
            package_dir: Dockyard-darwin-x64
            artifact_name: Dockyard-macOS-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Package app
        run: npx electron-packager . Dockyard --platform=${{ matrix.platform.target }} --arch=x64 --out dist --overwrite --prune=true

      - name: Upload CI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.artifact_name }}
          path: dist/${{ matrix.platform.package_dir }}

  publish:
    name: Publish GitHub release assets
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create zip files
        run: |
          mkdir -p release-zips
          for dir in release-assets/*; do
            [ -d "$dir" ] || continue
            name=$(basename "$dir")
            (cd release-assets && zip -r "../release-zips/${name}.zip" "$name")
          done

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Dockyard ${{ github.ref_name }}
          generate_release_notes: true
          files: release-zips/*.zip
